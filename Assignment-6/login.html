    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            display: flex;
            width: 100%;
        }
        .img-div{
            width: 50%;
            height: 550px;
        }
        .form-div{
            width: 50%;
            padding: 50px 120px 60px 120px;
        }
         label {
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .button {
            width: 100%;
            padding: 10px;
            background: #2575fc;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1a5ed9;
        }


   


    </style>
</head>
<body>
    <div class="container" >
        <div class="img-div">
            <img src="./images/sign-up.png" alt="banner-img" height="114%" width="100%" >
        </div>
        <div class="form-div">
            <form action="">
            <h3 align="center" style="margin-top: 20px; font-family: sans-serif;">Login <br>
                <span style="font-size: 12px; color: #6d6a6a;"> Countinue with <a href="./signup.html"><span style="color: #2575fc;">G</span><span style="color: red">o</span><span style="color: yellow">o</span><span style="color: #2575fc;">g</span><span style="color: rgb(107, 226, 107)">l</span><span style="color: red">e</span></a></span>
            </h3>
            <br>
            <br>
                    <label for="">Full Name</label>
                    <input type="text" name="" id="" placeholder="enter your full name" required>
                    <label for="">Email </label>
                    <input type="email" name="" id="" placeholder="enter your  email" required>

                    <label for="">Password</label>
                    <input type="number" name="" id="" placeholder="enter password" required>
                    <br>
                    <br>
                    <a class="button" href="./index.html">Login</a>
            </form>
        </div>
    </div>
</body>
