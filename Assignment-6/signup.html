    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            display: flex;
            width: 100%;
        }
        .img-div{
            width: 50%;
            height: 550px;
        }
        .form-div{
            width: 50%;
            padding: 50px 120px 60px 120px;
        }
         label {
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2575fc;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1a5ed9;
        }


   


    </style>
</head>
<body>
    <div class="container" >
        <div class="img-div">
            <img src="./images/sign-up.png" alt="banner-img" height="114%" width="100%" >
        </div>
        <div class="form-div">
            <form action="">
            <h3 align="center" style="margin-top: 20px; font-family: sans-serif;">Sign Up <br>
                <span style="font-size: 12px; color: #6d6a6a;"> I have already account <a href="./login.html">login now</a></span>
            </h3>
            <br>
            <br>
                    <label for="">Full Name</label>
                    <input type="text" name="" id="" placeholder="enter your full name" required>
                    <label for="">Email </label>
                    <input type="email" name="" id="" placeholder="enter your  email" required>

                    <label for="">Password</label>
                    <input type="number" name="" id="" placeholder="enter password" required>

                    <label for="">Phone Number</label>
                    <input type="number" name="" id="" placeholder="enter your phone number" required>

                    <label style="width: auto;" for="">Gender</label><br>
                    <input style="width: auto; transform: scale(1.5)" type="radio" name="gender" value="male" id="">&nbsp;&nbsp; Male &nbsp;&nbsp;
                    <input style="width: auto; transform: scale(1.5)" type="radio" name="gender" value="female" id="">&nbsp;&nbsp; Female
                    <br>
                    <br>
                    <Button type="submit">SignUp</Button>
            </form>
        </div>
    </div>
</body>
